version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # DATA LAYER
  # ---------------------------------------------------------------------------

  # Neo4j - Knowledge Graph
  neo4j:
    image: neo4j:5.15.0
    restart: unless-stopped
    container_name: brain_neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./data/neo4j/data:/data
    networks:
      - brain_net

  # ChromaDB - Vector Database
  chroma:
    image: chromadb/chroma:latest
    container_name: brain_chroma
    ports:
      - "8002:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    networks:
      - brain_net

  # PostgreSQL - Relational DB (Users, Logs, Metadata)
  postgres:
    image: postgres:16
    container_name: brain_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=secondbrain
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - brain_net

  # Redis - Cache & Message Queue (Celery)
  redis:
    image: redis:7.2
    container_name: brain_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - brain_net

  # ---------------------------------------------------------------------------
  # OPTIONAL: ADMIN TOOLS
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: brain_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    networks:
      - brain_net
    depends_on:
      - postgres

networks:
  brain_net:
    driver: bridge
